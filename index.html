    <style>

        /* --- 1. AQUÍ VAN LAS INSTRUCCIONES DE LA CLASE .semana --- */
        .semana {
            background-color: #1a1a1a;
            border: 2px solid #bc13fe;
            border-radius: 15px;
            padding: 20px;
            margin: 20px auto; /* Centra la tarjeta */
            max-width: 800px;  /* Para que no sea demasiado ancha */
            text-align: left;  /* El texto de la tarea a la izquierda */
            box-shadow: 0 5px 15px rgba(188, 19, 254, 0.3);
            transition: transform 0.3s ease;
        }
        .semana:hover {
            transform: translateY(-5px); /* Pequeño salto al pasar el mouse */
        }

        .semana h2 

         {color: #bc13fe;
            margin-top: 0;
        }
        h1 {
            color: #fff;

        }
        header{
            padding: 20px;
            background-color: aqua;
border-bottom: 2px solid #e5dae9; /* Una línea morada para combinar */
    }
    
    /* EL TÍTULO NEÓN */
    h1 {
        color: #fff;
        text-transform: uppercase;
        letter-spacing: 2px;
        /* Capas de sombra para el efecto de brillo */
        text-shadow: 
            0 0 7px #fff,

            0 0 42px #1389fe,
            0 0 82px #1313fe,

        main{

        .pdf-container {
